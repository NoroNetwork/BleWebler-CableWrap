name: BleWebler
options:
  bundleIdPrefix: com.noronetwork
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

targets:
  BleWebler:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: BleWebler
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.noronetwork.blewebler
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_USER_SCRIPT_SANDBOXING: YES
    info:
      path: BleWebler/Info.plist
      properties:
        CFBundleDisplayName: BleWebler
        CFBundleShortVersionString: "1.0"
        LSRequiresIPhoneOS: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSBluetoothAlwaysUsageDescription: "BleWebler uses Bluetooth to connect to your label printer so it can print labels."
        NSBluetoothPeripheralUsageDescription: "BleWebler uses Bluetooth to connect to your label printer so it can print labels."
